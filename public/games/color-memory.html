<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>색깔 기억하기 | MGH</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/color-memory.css">
</head>
<body>
    <div class="site-shell game-page">
        <header class="game-header">
            <a class="back-link" href="../index.html">← 메뉴</a>
            <div>
                <p class="eyebrow">MGH GAME 07</p>
                <h1>색깔 기억하기</h1>
            </div>
        </header>

        <main>
            <section class="game-panel">

                <div class="score-board three-cols">
                    <div>
                        <span>현재 라운드</span>
                        <strong id="roundText">0</strong>
                    </div>
                    <div>
                        <span>입력</span>
                        <strong id="inputText">0 / 0</strong>
                    </div>
                    <div>
                        <span>최고 라운드</span>
                        <strong id="bestRoundText">0</strong>
                    </div>
                </div>

                <div class="color-memory-message">
                    <strong id="messageTitle">색깔 기억하기</strong>
                    <p id="messageText">START를 누르면 게임이 시작됩니다.</p>
                </div>

                <div id="colorBoard" class="color-board" aria-label="색깔 버튼">
                    <button class="color-btn red" type="button" data-color="red" aria-label="빨강"></button>
                    <button class="color-btn blue" type="button" data-color="blue" aria-label="파랑"></button>
                    <button class="color-btn yellow" type="button" data-color="yellow" aria-label="노랑"></button>
                    <button class="color-btn green" type="button" data-color="green" aria-label="초록"></button>
                </div>

                <div class="game-actions">
                    <button id="startColorMemory" class="primary-btn" type="button">START</button>
                    <button id="resetColorMemory" class="ghost-btn" type="button">기록 초기화</button>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/color-memory.js"></script>
</body>
</html>

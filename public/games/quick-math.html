<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>빠른 계산 | MGH</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/quick-math.css">
</head>
<body>
    <div class="site-shell game-page">
        <header class="game-header">
            <a class="back-link" href="../index.html">← 메뉴</a>
            <div>
                <p class="eyebrow">MGH SINGLE GAME 07</p>
                <h1>빠른 계산</h1>
            </div>
        </header>

        <main>
            <section class="game-panel">
                <div class="score-board three-cols">
                    <div>
                        <span>남은 시간</span>
                        <strong id="timeText">30</strong>
                    </div>
                    <div>
                        <span>점수</span>
                        <strong id="scoreText">0</strong>
                    </div>
                    <div>
                        <span>최고 점수</span>
                        <strong id="bestScoreText">0</strong>
                    </div>
                </div>

                <section class="math-question-box">
                    <span id="questionLabel">문제</span>
                    <strong id="questionText">READY?</strong>
                    <p id="questionHint">START를 누르면 30초 동안 문제가 나옵니다.</p>
                </section>

                <section class="answer-box">
                    <span>입력한 답</span>
                    <strong id="answerText">0</strong>
                </section>

                <div class="keypad" aria-label="숫자 입력 키패드">
                    <button class="keypad-btn" type="button" data-key="7">7</button>
                    <button class="keypad-btn" type="button" data-key="8">8</button>
                    <button class="keypad-btn" type="button" data-key="9">9</button>

                    <button class="keypad-btn" type="button" data-key="4">4</button>
                    <button class="keypad-btn" type="button" data-key="5">5</button>
                    <button class="keypad-btn" type="button" data-key="6">6</button>

                    <button class="keypad-btn" type="button" data-key="1">1</button>
                    <button class="keypad-btn" type="button" data-key="2">2</button>
                    <button class="keypad-btn" type="button" data-key="3">3</button>

                    <button class="keypad-btn danger" type="button" data-key="clear">C</button>
                    <button class="keypad-btn" type="button" data-key="0">0</button>
                    <button class="keypad-btn danger" type="button" data-key="back">←</button>
                </div>

                <div class="game-actions math-actions">
                    <button id="startMath" class="primary-btn" type="button">START</button>
                    <button id="submitMath" class="ghost-btn" type="button" disabled>제출</button>
                </div>

                <div class="game-actions">
                    <button id="resetMath" class="ghost-btn full-btn" type="button">기록 초기화</button>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/quick-math.js"></script>
</body>
</html>

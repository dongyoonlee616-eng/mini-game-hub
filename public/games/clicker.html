<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클릭 속도 테스트 | MGH</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/clicker.css">   
</head>
<body>
    <div class="site-shell game-page">
        <header class="game-header">
            <a class="back-link" href="../index.html">← 메뉴</a>
            <div>
                <p class="eyebrow">MGH GAME 02</p>
                <h1>클릭 속도 테스트</h1>
            </div>
        </header>

        <main>
            <section class="game-panel">
                
                <div class="timer-line">
                    <span>남은 시간</span>
                    <strong id="timeLeft">5.0초</strong>
                </div>

                <button id="clickTarget" class="tap-zone" disabled>대기 중</button>

                <div class="game-actions">
                    <button id="startClicker" class="primary-btn">START</button>
                    <button id="resetClicker" class="ghost-btn">기록 초기화</button>
                </div>

                <div class="score-board three-cols">
                    <div>
                        <span>터치 수</span>
                        <strong id="clickCount">0</strong>
                    </div>
                    <div>
                        <span>CPS</span>
                        <strong id="cpsResult">0.00</strong>
                    </div>
                    <div>
                        <span>최고 CPS</span>
                        <strong id="bestCps">0.00</strong>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/clicker.js"></script>
</body>
</html>

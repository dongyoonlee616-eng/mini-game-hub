<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>순간 판단 | MGH</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/quick-judgement.css">
</head>
<body>
    <div class="site-shell game-page">
        <header class="game-header">
            <a class="back-link" href="../index.html">← 메뉴</a>
            <div>
                <p class="eyebrow">MGH SINGLE GAME 10</p>
                <h1>순간 판단</h1>
            </div>
        </header>

        <main>
            <section class="game-panel">
                <div class="score-board three-cols">
                    <div>
                        <span>남은 시간</span>
                        <strong id="timeText">30</strong>
                    </div>
                    <div>
                        <span>점수</span>
                        <strong id="scoreText">0</strong>
                    </div>
                    <div>
                        <span>최고 점수</span>
                        <strong id="bestScoreText">0</strong>
                    </div>
                </div>

                <section class="judge-challenge-box">
                    <span id="challengeLabel">문제</span>
                    <strong id="challengeText" class="challenge-word">READY?</strong>
                    <p id="challengeHint">START를 누르면 판단 문제가 시작됩니다.</p>
                </section>

                <div class="judge-options" aria-label="색깔 선택 버튼">
                    <button class="judge-option-btn red" type="button" data-color="red" disabled>빨강</button>
                    <button class="judge-option-btn blue" type="button" data-color="blue" disabled>파랑</button>
                    <button class="judge-option-btn yellow" type="button" data-color="yellow" disabled>노랑</button>
                    <button class="judge-option-btn green" type="button" data-color="green" disabled>초록</button>
                </div>

                <div class="game-actions">
                    <button id="startJudgement" class="primary-btn" type="button">START</button>
                    <button id="resetJudgement" class="ghost-btn" type="button">기록 초기화</button>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/quick-judgement.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>턴제 카드 뒤집기 | MGH</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/memory-card-multi.css">
</head>
<body>
    <div class="site-shell game-page">
        <header class="game-header">
            <a class="back-link" href="../index.html">← 메뉴</a>
            <div>
                <p class="eyebrow">MGH GAME 06</p>
                <h1>턴제 카드 뒤집기</h1>
            </div>
        </header>

        <main>
            <section class="game-panel">
                <p class="game-rule">
                    두 명이 번갈아 카드를 뒤집습니다. 같은 카드를 맞추면 점수를 얻고 턴을 유지합니다.
                </p>

                <section id="multiMemorySetup" class="memory-setup">
                    <strong>게임판 크기 선택</strong>
                    <p>5x5는 칸 수가 홀수라 보너스 카드 1장이 포함됩니다.</p>

                    <div class="memory-size-list">
                        <button class="memory-size-btn" type="button" data-size="4">
                            <span>4 × 4</span>
                            <small>8쌍</small>
                        </button>

                        <button class="memory-size-btn" type="button" data-size="5">
                            <span>5 × 5</span>
                            <small>12쌍 + 보너스</small>
                        </button>

                        <button class="memory-size-btn" type="button" data-size="6">
                            <span>6 × 6</span>
                            <small>18쌍</small>
                        </button>
                    </div>
                </section>

                <section id="multiMemoryGame" class="memory-game is-hidden">
                    <div class="turn-board">
                        <div id="playerOneBox" class="player-box active">
                            <span>PLAYER 1</span>
                            <strong id="playerOneScore">0</strong>
                        </div>

                        <div class="turn-info">
                            <span>현재 턴</span>
                            <strong id="currentTurn">P1</strong>
                        </div>

                        <div id="playerTwoBox" class="player-box">
                            <span>PLAYER 2</span>
                            <strong id="playerTwoScore">0</strong>
                        </div>
                    </div>

                    <div class="memory-status">
                        <div>
                            <span>크기</span>
                            <strong id="boardSize">-</strong>
                        </div>
                        <div>
                            <span>시도</span>
                            <strong id="tryCount">0</strong>
                        </div>
                        <div>
                            <span>맞춘 짝</span>
                            <strong id="matchCount">0 / 0</strong>
                        </div>
                    </div>

                    <div id="memoryBoard" class="memory-board" aria-label="턴제 카드 뒤집기 게임판"></div>

                    <div class="game-actions">
                        <button id="restartMultiMemory" class="primary-btn" type="button">다시 시작</button>
                        <button id="changeSizeMultiMemory" class="ghost-btn" type="button">크기 변경</button>
                    </div>

                    <div class="memory-result">
                        <strong id="memoryMessage">PLAYER 1부터 시작합니다.</strong>
                        <p>맞추면 턴 유지, 틀리면 상대 턴으로 넘어갑니다.</p>
                    </div>
                </section>
            </section>
        </main>
    </div>

    <script src="../js/memory-card-multi.js"></script>
</body>
</html>

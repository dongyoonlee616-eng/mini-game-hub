<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>폭탄 피하기 | MGH</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/bomb-dodge.css">
</head>
<body>
    <div class="site-shell game-page">
        <header class="game-header">
            <a class="back-link" href="../index.html">← 메뉴</a>
            <div>
                <p class="eyebrow">MGH SINGLE GAME 08</p>
                <h1>폭탄 피하기</h1>
            </div>
        </header>

        <main>
            <section class="game-panel">
                <div class="score-board three-cols">
                    <div>
                        <span>생존 시간</span>
                        <strong id="timeText">0.0초</strong>
                    </div>
                    <div>
                        <span>최고 기록</span>
                        <strong id="bestTimeText">-</strong>
                    </div>
                    <div>
                        <span>난이도</span>
                        <strong id="levelText">1</strong>
                    </div>
                </div>

                <section class="bomb-message-box">
                    <strong id="messageTitle">폭탄 피하기</strong>
                    <p id="messageText">START를 누르고 화면을 드래그해서 폭탄을 피하세요.</p>
                </section>

                <div class="bomb-game-wrap">
                    <canvas id="bombCanvas" class="bomb-canvas" width="320" height="430"></canvas>
                </div>

                <div class="game-actions">
                    <button id="startBombGame" class="primary-btn" type="button">START</button>
                    <button id="resetBombGame" class="ghost-btn" type="button">기록 초기화</button>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/bomb-dodge.js"></script>
</body>
</html>
